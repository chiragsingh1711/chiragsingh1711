name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake animations
        uses: Platane/snk@v3
        with:
          github_user_name: chiragsingh1711
          outputs: |
            dist/github-snake.svg?color_snake=#4A00E0&color_dots=#ebedf0,#c4b5fd,#a78bfa,#8b5cf6,#6d28d9
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00C9FF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
